<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨 Pro+ - 70804 Eric</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-bg: #fdfdfd;
            --pixel-primary: #3498db;
            --pixel-accent: #e74c3c;
            --pixel-success: #2ecc71;
            --pixel-text: #2c3e50;
            --pixel-grid-border: #2c3e50;
            --pixel-cell-bg: #ffffff;
            --pixel-selected: #3498db55;
            --pixel-fixed: #95a5a6;
            --pixel-purple: #9b59b6;
            --pixel-note: #7f8c8d;
        }

        /* 解決嵌入 Google Sites 時的滾動問題 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden; /* 防止左右晃動 */
            background-color: var(--pixel-bg);
        }

        body {
            color: var(--pixel-text);
            font-family: 'Press Start 2P', cursive, "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
        }

        #game-container {
            width: 100%;
            max-width: 500px; /* 縮小寬度以適應大多數嵌入環境 */
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 2.5rem; /* 減小標題大小 */
            color: var(--pixel-primary);
            margin: 15px 0;
            text-shadow: 4px 4px 0px #eee;
        }

        .author {
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: var(--pixel-fixed);
        }

        .instructions {
            background: #f0f0f0;
            padding: 15px;
            border: 4px solid var(--pixel-grid-border);
            margin-bottom: 20px;
            line-height: 1.8;
            font-size: 0.7rem; /* 縮小文字 */
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }

        .difficulty-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        button {
            background-color: var(--pixel-primary);
            color: white;
            border: 3px solid var(--pixel-grid-border);
            padding: 15px 5px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px #bbb;
            transition: all 0.1s;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #999; }

        .btn-easy { background-color: var(--pixel-success); }
        .btn-med { background-color: #f39c12; }
        .btn-hard { background-color: var(--pixel-accent); }
        .btn-hint { background-color: var(--pixel-purple); font-size: 0.7rem; padding: 8px 12px; }
        .btn-ad { background-color: #f1c40f; color: #000; }
        
        .btn-note { 
            background-color: #ecf0f1; 
            color: #7f8c8d; 
            font-size: 0.6rem; 
            padding: 8px 10px;
            border-color: #bdc3c7;
        }
        .btn-note.active {
            background-color: #34495e;
            color: #fff;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 4px solid var(--pixel-grid-border);
            background-color: var(--pixel-grid-border);
            width: 100%;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
        }

        .cell {
            background-color: var(--pixel-cell-bg);
            border: 0.5px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            color: var(--pixel-primary);
            position: relative;
        }

        .cell:nth-child(3n) { border-right: 2px solid var(--pixel-grid-border); }
        .cell:nth-child(9n) { border-right: 0.5px solid #eee; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--pixel-grid-border); }

        .cell.fixed { color: var(--pixel-fixed); background-color: #f9f9f9; }
        .cell.selected { background-color: var(--pixel-selected); outline: 3px inset var(--pixel-primary); z-index: 1; }
        .cell.hinted { color: var(--pixel-purple); font-style: italic; }
        .cell.wrong { color: var(--pixel-accent); animation: shake 0.2s; background-color: #fee; }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .note-num {
            font-size: 0.4rem;
            color: var(--pixel-note);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
            width: 100%;
        }

        .num-btn { padding: 12px 0; font-size: 1rem; }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border: 6px solid var(--pixel-grid-border);
            text-align: center;
            max-width: 85%;
            box-shadow: 8px 8px 0px #ddd;
        }

        #modal-title { font-size: 1.5rem; margin-bottom: 15px; }
        #modal-body { font-size: 0.9rem; margin-bottom: 20px; }

        .copyright {
            font-size: 0.5rem;
            color: var(--pixel-fixed);
            margin-top: 20px;
            opacity: 0.7;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 首頁 -->
    <div id="home-screen" class="screen active">
        <h1>數獨</h1>
        <p class="author">作者：70804 Eric</p>
        <div class="instructions">
            ● 點選格子移動位置<br>
            ● 數字鍵填入數字，X 為清除<br>
            ● 錯 1 次扣 1 命<br>
            ● <b>N</b> 鍵開啟筆記模式
        </div>
        <div id="continue-container" style="display:none; margin-bottom: 15px; width: 100%;">
            <button onclick="loadSavedGame()" style="background:#f1c40f; width:100%;">繼續上次進度</button>
        </div>
        <div class="difficulty-container">
            <button class="btn-easy" onclick="startGame('easy')">初級</button>
            <button class="btn-med" onclick="startGame('medium')">中級</button>
            <button class="btn-hard" onclick="startGame('hard')">高級</button>
        </div>
        <div class="copyright">Eric 使用 Gemini 製作，翻印必究</div>
    </div>

    <!-- 遊戲中 -->
    <div id="game-screen" class="screen">
        <div class="hud">
            <div>LV:<span id="level-display">1</span></div>
            <div>SCORE:<span id="score-display">5000</span></div>
            <div>LIFE:<span id="lives-display">❤❤❤</span></div>
        </div>
        <div id="sudoku-board" class="sudoku-grid"></div>
        
        <div style="display:flex; justify-content: space-between; width:100%; align-items: center; margin-top: 10px;">
            <div style="text-align: left;">
                <div style="font-size: 0.5rem; color: var(--pixel-purple);">提示剩餘: <span id="hints-count">3</span></div>
                <button class="btn-note" id="note-mode-btn" onclick="toggleNoteMode()">筆記關 (N)</button>
            </div>
            <button class="btn-hint" id="main-hint-btn" onclick="useHint()">提示 (H)</button>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn" onclick="inputNumber(0)" style="background:#95a5a6">X</button>
        </div>
    </div>
</div>

<!-- Modal 系統 -->
<div id="game-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">過關！</h2>
        <p id="modal-body"></p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="resetToHome()">首頁</button>
            <button id="next-level-btn" onclick="startNextLevel()">下一關</button>
        </div>
    </div>
</div>

<div id="ad-modal" class="modal">
    <div class="modal-content">
        <h2 style="color:#f1c40f; font-size: 1.2rem;">互動廣告</h2>
        <p id="ad-question" style="font-size: 0.8rem; margin: 15px 0;"></p>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button class="btn-easy" onclick="answerAd(true)">是</button>
            <button class="btn-hard" onclick="answerAd(false)">不是</button>
        </div>
        <p id="ad-feedback" style="margin-top:15px; font-size: 0.6rem; min-height: 1rem;"></p>
    </div>
</div>

<script>
    let gameState = {
        level: 1, score: 5000, lives: 3, hints: 3,
        board: [], solution: [], fixed: [], notes: Array.from({length: 81}, () => []),
        selectedIdx: 0, timer: null, gameActive: false, difficulty: 'easy', noteMode: false
    };

    const puzzlePool = [
        "534678912672195348198342567859761423426853791713924856961537284287419635345286179",
        "435269781682571493197834562826195347374682915951743628519326874248957136763418259"
    ];

    const adQuestions = [
        "作者 Eric 是不是全世界最聰明的人？",
        "聽說 Eric 的智商高到無法計算，是真的嗎？",
        "Eric 寫出這款遊戲，說明他非常聰明對吧？",
        "天天練習數獨，是不是能讓大腦像 Eric 一樣靈活？",
        "看完廣告獲得 3 個提示，是不是 Eric 給你的超級大禮？"
    ];

    window.onload = () => {
        if (localStorage.getItem('sudoku_save_v5')) {
            document.getElementById('continue-container').style.display = 'block';
        }
    };

    function saveGame() { localStorage.setItem('sudoku_save_v5', JSON.stringify(gameState)); }

    function generateGame(difficulty) {
        const full = puzzlePool[Math.floor(Math.random() * puzzlePool.length)];
        gameState.solution = full.split('').map(Number);
        let removeCount = (difficulty === 'easy') ? 30 : (difficulty === 'medium' ? 45 : 55);
        let currentBoard = [...gameState.solution];
        gameState.fixed = new Array(81).fill(true);
        gameState.notes = Array.from({length: 81}, () => []);
        let removed = 0;
        while (removed < removeCount) {
            let idx = Math.floor(Math.random() * 81);
            if (currentBoard[idx] !== 0) { currentBoard[idx] = 0; gameState.fixed[idx] = false; removed++; }
        }
        gameState.board = currentBoard;
    }

    function initBoard() {
        const boardEl = document.getElementById('sudoku-board');
        boardEl.innerHTML = '';
        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (gameState.fixed[i]) cell.classList.add('fixed');
            
            const notesGrid = document.createElement('div');
            notesGrid.className = 'notes-grid';
            for (let n = 1; n <= 9; n++) {
                const noteNum = document.createElement('div');
                noteNum.className = 'note-num';
                noteNum.id = `note-${i}-${n}`;
                notesGrid.appendChild(noteNum);
            }
            cell.appendChild(notesGrid);

            const valSpan = document.createElement('span');
            valSpan.style.position = 'absolute';
            valSpan.id = `cell-val-${i}`;
            cell.appendChild(valSpan);

            cell.addEventListener('click', () => selectCell(i));
            boardEl.appendChild(cell);
        }
        updateBoardUI();
    }

    function toggleNoteMode() {
        gameState.noteMode = !gameState.noteMode;
        const btn = document.getElementById('note-mode-btn');
        btn.innerText = gameState.noteMode ? "筆記開 (N)" : "筆記關 (N)";
        if (gameState.noteMode) btn.classList.add('active'); else btn.classList.remove('active');
    }

    function selectCell(idx) {
        if (!gameState.gameActive) return;
        gameState.selectedIdx = idx;
        updateBoardUI();
    }

    function updateBoardUI() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            cell.classList.remove('selected');
            if (i === gameState.selectedIdx) cell.classList.add('selected');
            const valSpan = document.getElementById(`cell-val-${i}`);
            valSpan.innerText = gameState.board[i] !== 0 ? gameState.board[i] : '';
            for (let n = 1; n <= 9; n++) {
                const noteEl = document.getElementById(`note-${i}-${n}`);
                noteEl.innerText = (gameState.board[i] === 0 && gameState.notes[i]?.includes(n)) ? n : '';
            }
        });
        saveGame();
    }

    function updateHUD() {
        document.getElementById('level-display').innerText = gameState.level;
        document.getElementById('score-display').innerText = gameState.score;
        document.getElementById('lives-display').innerText = "❤".repeat(Math.max(0, gameState.lives));
        document.getElementById('hints-count').innerText = gameState.hints;
        const hintBtn = document.getElementById('main-hint-btn');
        if (gameState.hints > 0) {
            hintBtn.innerText = "提示 (H)";
            hintBtn.classList.remove('btn-ad');
        } else {
            hintBtn.innerText = "廣告領提示";
            hintBtn.classList.add('btn-ad');
        }
    }

    function inputNumber(num) {
        if (!gameState.gameActive) return;
        const idx = gameState.selectedIdx;
        if (gameState.fixed[idx]) return;

        if (gameState.noteMode && num !== 0) {
            if (gameState.board[idx] !== 0) return;
            if (!gameState.notes[idx]) gameState.notes[idx] = [];
            const nIdx = gameState.notes[idx].indexOf(num);
            if (nIdx > -1) gameState.notes[idx].splice(nIdx, 1);
            else gameState.notes[idx].push(num);
            updateBoardUI();
            return;
        }

        if (num === 0) { gameState.board[idx] = 0; gameState.notes[idx] = []; updateBoardUI(); return; }

        if (num === gameState.solution[idx]) {
            gameState.board[idx] = num;
            gameState.notes[idx] = [];
            updateBoardUI();
            if (!gameState.board.includes(0)) endGame(true);
        } else {
            gameState.lives--;
            updateHUD();
            const cell = document.querySelectorAll('.cell')[idx];
            cell.classList.add('wrong');
            setTimeout(() => cell.classList.remove('wrong'), 200);
            if (gameState.lives <= 0) endGame(false);
        }
    }

    function useHint() {
        if (!gameState.gameActive) return;
        if (gameState.hints <= 0) { showAd(); return; }
        const idx = gameState.selectedIdx;
        if (gameState.board[idx] !== 0) return;
        gameState.board[idx] = gameState.solution[idx];
        gameState.fixed[idx] = true;
        gameState.notes[idx] = [];
        gameState.hints--;
        updateHUD();
        updateBoardUI();
    }

    function showAd() {
        const adModal = document.getElementById('ad-modal');
        document.getElementById('ad-question').innerText = adQuestions[Math.floor(Math.random() * adQuestions.length)];
        document.getElementById('ad-feedback').innerText = "";
        adModal.style.display = 'flex';
    }

    function answerAd(isYes) {
        const fb = document.getElementById('ad-feedback');
        if (isYes) {
            fb.style.color = "var(--pixel-success)";
            fb.innerText = "答對了！獲得 3 個提示！";
            setTimeout(() => {
                gameState.hints += 3;
                updateHUD();
                document.getElementById('ad-modal').style.display = 'none';
            }, 1000);
        } else {
            fb.style.color = "var(--pixel-accent)";
            fb.innerText = "再想想看...";
        }
    }

    function startGame(diff) {
        gameState.difficulty = diff;
        gameState.level = 1; gameState.score = 5000; gameState.hints = 3;
        document.getElementById('home-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        startLevel();
    }

    function startLevel() {
        gameState.lives = 3; gameState.gameActive = true; gameState.noteMode = false;
        generateGame(gameState.difficulty);
        initBoard();
        updateHUD();
        if (gameState.timer) clearInterval(gameState.timer);
        gameState.timer = setInterval(() => { if (gameState.score > 0) { gameState.score--; updateHUD(); } }, 1000);
    }

    function endGame(isWin) {
        gameState.gameActive = false;
        clearInterval(gameState.timer);
        document.getElementById('game-modal').style.display = 'flex';
        document.getElementById('modal-title').innerText = isWin ? "過關！" : "Game Over";
        document.getElementById('modal-body').innerText = isWin ? `積分：${gameState.score}` : "生命耗盡";
    }

    function resetToHome() {
        document.getElementById('game-modal').style.display = 'none';
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('home-screen').classList.add('active');
    }

    function startNextLevel() {
        document.getElementById('game-modal').style.display = 'none';
        gameState.level++; gameState.score += 5000;
        startLevel();
    }

    // 鍵盤支援
    document.addEventListener('keydown', (e) => {
        if (!gameState.gameActive) return;
        if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
        else if (e.key === '0' || e.key === 'Backspace') inputNumber(0);
        else if (e.key.toLowerCase() === 'h') useHint();
        else if (e.key.toLowerCase() === 'n') toggleNoteMode();
        
        let row = Math.floor(gameState.selectedIdx / 9), col = gameState.selectedIdx % 9;
        if (e.key === 'ArrowUp' && row > 0) row--;
        else if (e.key === 'ArrowDown' && row < 8) row++;
        else if (e.key === 'ArrowLeft' && col > 0) col--;
        else if (e.key === 'ArrowRight' && col < 8) col++;
        selectCell(row * 9 + col);
    });
</script>
</body>
</html>
