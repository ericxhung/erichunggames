<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨 Pro+ - 70804 Eric</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-bg: #fdfdfd;
            --pixel-primary: #3498db;
            --pixel-accent: #e74c3c;
            --pixel-success: #2ecc71;
            --pixel-text: #2c3e50;
            --pixel-grid-border: #2c3e50;
            --pixel-cell-bg: #ffffff;
            --pixel-selected: #3498db55;
            --pixel-fixed: #95a5a6;
            --pixel-purple: #9b59b6;
            --pixel-note: #7f8c8d;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            overflow-x: hidden;
            background-color: var(--pixel-bg);
        }

        body {
            color: var(--pixel-text);
            font-family: 'Press Start 2P', cursive, "Microsoft JhengHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            image-rendering: pixelated;
        }

        #game-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--pixel-primary);
            margin: 15px 0;
            text-shadow: 4px 4px 0px #eee;
        }

        .author {
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: var(--pixel-fixed);
        }

        .instructions {
            background: #f8f9fa;
            padding: 15px;
            border: 4px dashed var(--pixel-grid-border);
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 0.7rem;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
            color: #444;
        }

        .difficulty-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        button {
            background-color: var(--pixel-primary);
            color: white;
            border: 3px solid var(--pixel-grid-border);
            padding: 12px 5px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px #bbb;
            transition: all 0.1s;
        }

        button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #999; }

        .btn-easy { background-color: var(--pixel-success); }
        .btn-med { background-color: #f39c12; }
        .btn-hard { background-color: var(--pixel-accent); }
        .btn-hint { background-color: var(--pixel-purple); font-size: 0.7rem; padding: 8px 12px; }
        .btn-history { background-color: #f1c40f; color: #000; font-size: 0.6rem; }
        
        .btn-note { 
            background-color: #ecf0f1; 
            color: #7f8c8d; 
            font-size: 0.6rem; 
            padding: 8px 10px;
            border-color: #bdc3c7;
        }
        .btn-note.active {
            background-color: #34495e;
            color: #fff;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 4px solid var(--pixel-grid-border);
            background-color: var(--pixel-grid-border);
            width: 100%;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
        }

        .cell {
            background-color: var(--pixel-cell-bg);
            border: 0.5px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            color: var(--pixel-primary);
            position: relative;
        }

        .cell:nth-child(3n) { border-right: 2px solid var(--pixel-grid-border); }
        .cell:nth-child(9n) { border-right: 0.5px solid #eee; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--pixel-grid-border); }

        .cell.fixed { color: var(--pixel-fixed); background-color: #f9f9f9; }
        .cell.selected { background-color: var(--pixel-selected); outline: 3px inset var(--pixel-primary); z-index: 1; }
        .cell.wrong { color: var(--pixel-accent); animation: shake 0.2s; background-color: #fee; }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .note-num {
            font-size: 0.4rem;
            color: var(--pixel-note);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 15px;
            width: 100%;
        }

        .num-btn { padding: 12px 0; font-size: 1rem; }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            padding: 25px;
            border: 6px solid var(--pixel-grid-border);
            text-align: center;
            max-width: 85%;
            box-shadow: 8px 8px 0px #333;
        }

        #modal-title { font-size: 1.3rem; margin-bottom: 15px; }
        #modal-body { font-size: 0.75rem; margin-bottom: 20px; line-height: 1.6; text-align: left; }

        .copyright {
            font-size: 0.5rem;
            color: var(--pixel-fixed);
            margin-top: 20px;
            opacity: 0.7;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="home-screen" class="screen active">
        <h1>數獨 Pro+</h1>
        <p class="author">作者：70804 Eric</p>
        
        <div class="instructions">
            <strong>【遊戲規則與操作】</strong><br>
            1. 點擊空格後，使用下方數字鍵填入數字。<br>
            2. 每行、每列、每個 3x3 九宮格數字不可重複。<br>
            3. <strong>生命值：</strong>填錯會扣除 1 顆心，歸零則挑戰結束。<br>

        <div id="continue-container" style="display:none; margin-bottom: 15px; width: 100%;">
            <button onclick="loadSavedGame()" style="background:#f1c40f; width:100%;">繼續上次進度</button>

        <div class="difficulty-container">
            <button class="btn-easy" onclick="startGame('easy')">初級</button>

        </div>

    </div>

    <div id="game-screen" class="screen">
        <div class="hud">

            <div style="text-align: left;">
                <div style="font-size: 0.5rem; color: var(--pixel-purple);">提示剩餘: <span id="hints-count">3</span></div>

        <div class="numpad">

            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn" onclick="inputNumber(0)" style="background:#95a5a6">X</button>
        </div>
    </div>
</div>

<!-- Modal 區塊 -->
<div id="game-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title">過關！</h2>
        <p id="modal-body" style="text-align: center;"></p>
        <div id="modal-buttons" style="display:flex; gap:10px; justify-content:center;">
            <button onclick="resetToHome()">首頁</button>

<div id="history-modal" class="modal">
    <div class="modal-content">
        <h2 style="color:#f1c40f; font-size: 1.1rem; margin-bottom: 12px;">📜 數獨百科 (No.<span id="history-id"></span>/50)</h2>
        <p id="history-text" style="font-size: 0.75rem; line-height: 1.6; text-align: left; margin-bottom: 15px;"></p>
        <p id="history-reward-text" style="font-size: 0.6rem; color: var(--pixel-success); margin-bottom: 15px;">※ 獎勵已備好！</p>
        <button class="btn-easy" id="history-confirm-btn" onclick="closeHistory()" style="width: 100%;">好的，我學到了！</button>
    </div>

<script>
    // --- 核心變量 ---
    let gameState = {
        level: 1, score: 5000, lives: 3, hints: 3,
        board: [], solution: [], fixed: [], notes: [],
        selectedIdx: 0, timer: null, gameActive: false, difficulty: 'easy', noteMode: false,
        pendingRevive: false
    };

    // --- 數獨生成演算法 (Backtracking) ---
    function isValid(board, row, col, num) {
        for (let x = 0; x < 9; x++) if (board[row * 9 + x] === num) return false;
        for (let x = 0; x < 9; x++) if (board[x * 9 + col] === num) return false;
        let startRow = row - row % 3, startCol = col - col % 3;
        for (let i = 0; i < 3; i++)
            for (let j = 0; j < 3; j++)
                if (board[(i + startRow) * 9 + (j + startCol)] === num) return false;
        return true;
    }

    function solveSudoku(board) {
        for (let i = 0; i < 81; i++) {
            if (board[i] === 0) {
                let nums = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
                for (let num of nums) {
                    let r = Math.floor(i / 9), c = i % 9;
                    if (isValid(board, r, c, num)) {
                        board[i] = num;
                        if (solveSudoku(board)) return true;
                        board[i] = 0;
                    }
                }
                return false;
            }
        }
        return true;
    }

    function generateNewSudoku(difficulty) {
        let board = new Array(81).fill(0);
        solveSudoku(board);
        gameState.solution = [...board];
        
        let removeCount = (difficulty === 'easy') ? 32 : (difficulty === 'medium' ? 46 : 54);
        gameState.fixed = new Array(81).fill(true);
        let removed = 0;
        while (removed < removeCount) {
            let idx = Math.floor(Math.random() * 81);
            if (board[idx] !== 0) {
                board[idx] = 0;
                gameState.fixed[idx] = false;
                removed++;
            }
        }
        gameState.board = board;
        gameState.notes = Array.from({length: 81}, () => []);
    }

    // --- 歷史知識庫 (50 則) ---
    const historyFacts = [

        { id: 9, text: "數學家證明，一個標準 9x9 數獨最少需要 17 個提示數才能保證有唯一解。" },

        { id: 11, text: "9x9 數獨的總排列組合數高達 6.67 x 10^21 種，這是一個天文數字。" },
        { id: 12, text: "第一屆世界數獨錦標賽(WSC)於 2006 年在義大利盧卡舉辦。" },
        { id: 13, text: "目前世界紀錄最快解開一個困難級數獨的時間不到 1.5 分鐘。" },
        { id: 14, text: "有些研究指出，長輩練習數獨有助於活化大腦神經連接，延緩認知衰退。" },
        { id: 15, text: "除了 9x9，數獨還有 4x4、6x6、甚至 16x16 (超級數獨) 等變體。" },
        { id: 16, text: "武士數獨(Samurai Sudoku)是由五個 9x9 數獨重疊組成的複雜挑戰。" },
        { id: 17, text: "早期數獨是靠純手工設計的，設計難點在於確保「唯一解」。" },
        { id: 18, text: "現代數獨多數是透過電腦演算法生成的，可以精確控制難度等級。" },
        { id: 19, text: "數獨在法語中最初被稱為「數字拼圖」(Carré magique)。" },
        { id: 20, text: "芬蘭數學家 Arto Inkala 曾宣稱設計出「世界最難數獨」，電腦也要算很久。" },

        { id: 22, text: "數獨被稱為「世界上最令人著迷的益智遊戲」，因為它規則簡單卻充滿深度。" },

        { id: 47, text: "數獨的解法可以用人工智慧中的「回溯法」(Backtracking) 實現。" },

        { id: 49, text: "數獨也與拉丁方陣中的「相互正交拉丁方陣」理論密切相關。" },

    let factQueue = [];
    function shuffleFacts() { factQueue = [...historyFacts].sort(() => Math.random() - 0.5); }
    function getNextFact() { if (factQueue.length === 0) shuffleFacts(); return factQueue.pop(); }

    // --- 遊戲流程控制 ---
    window.onload = () => {
        if (localStorage.getItem('sudoku_save_edu_final')) document.getElementById('continue-container').style.display = 'block';
        shuffleFacts();
    };

    function saveGame() { localStorage.setItem('sudoku_save_edu_final', JSON.stringify(gameState)); }

    function startGame(diff) {
        gameState.difficulty = diff;
        gameState.level = 1; gameState.score = 5000; gameState.hints = 3;
        document.getElementById('home-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        startLevel();
    }

    function startLevel() {
        gameState.lives = 3; gameState.gameActive = true; gameState.noteMode = false;
        generateNewSudoku(gameState.difficulty);
        initBoard();
        updateHUD();
        resetTimer();
    }

    function resetTimer() {
        if (gameState.timer) clearInterval(gameState.timer);
        gameState.timer = setInterval(() => { if (gameState.score > 0) { gameState.score--; updateHUD(); } }, 1000);
    }

    function initBoard() {
        const boardEl = document.getElementById('sudoku-board');
        boardEl.innerHTML = '';
        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (gameState.fixed[i]) cell.classList.add('fixed');
            
            const notesGrid = document.createElement('div');
            notesGrid.className = 'notes-grid';
            for (let n = 1; n <= 9; n++) {
                const noteNum = document.createElement('div');
                noteNum.className = 'note-num';
                noteNum.id = `note-${i}-${n}`;
                notesGrid.appendChild(noteNum);
            }
            cell.appendChild(notesGrid);

            const valSpan = document.createElement('span');
            valSpan.style.position = 'absolute';
            valSpan.id = `cell-val-${i}`;
            cell.appendChild(valSpan);

            cell.onclick = () => selectCell(i);
            boardEl.appendChild(cell);
        }
        updateBoardUI();
    }

    function selectCell(idx) {
        if (!gameState.gameActive) return;
        gameState.selectedIdx = idx;
        updateBoardUI();
    }

    function updateBoardUI() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            cell.classList.remove('selected');
            if (i === gameState.selectedIdx) cell.classList.add('selected');
            const valSpan = document.getElementById(`cell-val-${i}`);
            valSpan.innerText = gameState.board[i] !== 0 ? gameState.board[i] : '';
            for (let n = 1; n <= 9; n++) {
                const noteEl = document.getElementById(`note-${i}-${n}`);
                const hasNote = gameState.notes[i] && gameState.notes[i].includes(n);
                noteEl.innerText = (gameState.board[i] === 0 && hasNote) ? n : '';
            }
        });
        saveGame();
    }

    function updateHUD() {
        document.getElementById('level-display').innerText = gameState.level;
        document.getElementById('score-display').innerText = gameState.score;
        document.getElementById('lives-display').innerText = "❤".repeat(Math.max(0, gameState.lives));
        document.getElementById('hints-count').innerText = gameState.hints;
        const hintBtn = document.getElementById('main-hint-btn');
        hintBtn.innerText = gameState.hints > 0 ? "提示 (H)" : "學習領提示";
        if (gameState.hints <= 0) hintBtn.classList.add('btn-history'); else hintBtn.classList.remove('btn-history');
    }

    function inputNumber(num) {
        if (!gameState.gameActive) return;
        const idx = gameState.selectedIdx;
        if (gameState.fixed[idx]) return;

        if (gameState.noteMode && num !== 0) {
            if (gameState.board[idx] !== 0) return;
            const nIdx = gameState.notes[idx].indexOf(num);
            if (nIdx > -1) gameState.notes[idx].splice(nIdx, 1);
            else gameState.notes[idx].push(num);
            updateBoardUI();
            return;
        }

        if (num === 0) { gameState.board[idx] = 0; gameState.notes[idx] = []; updateBoardUI(); return; }

        if (num === gameState.solution[idx]) {
            gameState.board[idx] = num;
            gameState.notes[idx] = [];
            updateBoardUI();
            if (gameState.board.every(v => v !== 0)) endGame(true);
        } else {
            gameState.lives--;
            updateHUD();
            const cell = document.querySelectorAll('.cell')[idx];
            cell.classList.add('wrong');
            setTimeout(() => cell.classList.remove('wrong'), 200);
            if (gameState.lives <= 0) endGame(false);
        }
    }

    function useHint() {
        if (!gameState.gameActive) return;
        if (gameState.hints <= 0) { gameState.pendingRevive = false; showHistory(); return; }
        const idx = gameState.selectedIdx;
        if (gameState.board[idx] !== 0) return;
        gameState.board[idx] = gameState.solution[idx];
        gameState.fixed[idx] = true;
        gameState.notes[idx] = [];
        gameState.hints--;
        updateHUD();
        updateBoardUI();
        if (gameState.board.every(v => v !== 0)) endGame(true);
    }

    function showHistory() {
        const fact = getNextFact();
        document.getElementById('history-id').innerText = fact.id;
        document.getElementById('history-text').innerText = fact.text;
        document.getElementById('history-reward-text').innerText = gameState.pendingRevive ? "※ 學習完成！生命恢復 3 顆心！" : "※ 學習完成！獲得提示次數 +2！";
        document.getElementById('history-modal').style.display = 'flex';
        if (!gameState.pendingRevive) gameState.hints += 2;
        updateHUD();
    }

    function showHistoryForRevive() {
        document.getElementById('game-modal').style.display = 'none';
        gameState.pendingRevive = true;
        showHistory();
    }

    function closeHistory() {
        document.getElementById('history-modal').style.display = 'none';
        if (gameState.pendingRevive) {
            gameState.lives = 3; gameState.gameActive = true; gameState.pendingRevive = false;
            updateHUD(); resetTimer();
        }
    }

    function toggleNoteMode() {
        gameState.noteMode = !gameState.noteMode;
        const btn = document.getElementById('note-mode-btn');
        btn.innerText = gameState.noteMode ? "筆記開 (N)" : "筆記關 (N)";
        if (gameState.noteMode) btn.classList.add('active'); else btn.classList.remove('active');
    }

    function endGame(isWin) {
        gameState.gameActive = false;
        clearInterval(gameState.timer);
        const modal = document.getElementById('game-modal');
        modal.style.display = 'flex';
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');
        const btnNormal = document.getElementById('modal-buttons');
        const btnRevive = document.getElementById('revive-buttons');

        if (isWin) {
            title.innerText = "成功過關！";
            title.style.color = "var(--pixel-success)";
            body.innerText = `恭喜完成第 ${gameState.level} 關！\n最終評分：${gameState.score}`;
            btnNormal.style.display = 'flex';
            btnRevive.style.display = 'none';
            localStorage.removeItem('sudoku_save_edu_final');
        } else {
            title.innerText = "挑戰失敗";
            title.style.color = "var(--pixel-accent)";
            body.innerText = "生命已用盡，要學習知識來復活嗎？";
            btnNormal.style.display = 'none';
            btnRevive.style.display = 'flex';
        }
    }

    function startNextLevel() {
        document.getElementById('game-modal').style.display = 'none';
        gameState.level++; gameState.score += 3000;
        startLevel();
    }

    function resetToHome() {
        document.getElementById('game-modal').style.display = 'none';
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('home-screen').classList.add('active');
        if (gameState.timer) clearInterval(gameState.timer);
    }

    function loadSavedGame() {
        const saved = JSON.parse(localStorage.getItem('sudoku_save_edu_final'));
        if (saved) {
            gameState = saved;
            document.getElementById('home-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            initBoard(); updateHUD(); resetTimer();
            gameState.gameActive = true;
        }
    }

    // 鍵盤支持
    document.addEventListener('keydown', (e) => {
        if (!gameState.gameActive) return;
        if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
        else if (e.key === '0' || e.key === 'Backspace') inputNumber(0);
        else if (e.key.toLowerCase() === 'h') useHint();
        else if (e.key.toLowerCase() === 'n') toggleNoteMode();
        let r = Math.floor(gameState.selectedIdx / 9), c = gameState.selectedIdx % 9;
        if (e.key === 'ArrowUp' && r > 0) r--;
        else if (e.key === 'ArrowDown' && r < 8) r++;
        else if (e.key === 'ArrowLeft' && c > 0) c--;
        else if (e.key === 'ArrowRight' && c < 8) c++;
        selectCell(r * 9 + c);
    });
</script>
</body>
</html>
