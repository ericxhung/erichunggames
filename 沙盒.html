<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Botany Sandbox - Engineered Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; font-family: ui-sans-serif, system-ui, sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        .glass-panel { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: all 0.3s ease; }
        .light .glass-panel { background: rgba(255, 255, 255, 0.9); border-bottom: 1px solid rgba(0,0,0,0.1); color: #1e293b; }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); color: #f8fafc; }
        .active-tool { box-shadow: 0 0 0 2px #3b82f6; transform: scale(1.05); background: #3b82f6 !important; color: white !important; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        input[type="range"] { -webkit-appearance: none; height: 4px; border-radius: 2px; background: #cbd5e1; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #3b82f6; border-radius: 50%; border: 2px solid white; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col h-screen fixed inset-0 bg-slate-50 dark:bg-slate-950">

    <!-- 頂部資訊與控制 -->
    <div class="glass-panel p-3 shrink-0 z-20">
        <div class="flex items-center justify-between mb-2">
            <div>
                <h1 class="font-black text-blue-600 dark:text-blue-400 text-sm tracking-tighter italic uppercase">Engineered Sandbox v10.3</h1>
                <div class="flex gap-2 text-[10px] text-gray-400 font-mono">
                    FPS: <span id="fpsCounter">0</span> | OBJ: <span id="particleCount">0</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="themeToggle" class="p-2 bg-slate-200 dark:bg-slate-800 rounded-full">🌓</button>
                <button id="clearBtn" class="px-3 py-1 bg-red-500 text-white rounded text-[10px] font-bold">RESET</button>
            </div>
        </div>
        
        <!-- 筆刷與速度控制 -->
        <div class="grid grid-cols-2 gap-4 mb-3">
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] font-bold uppercase text-slate-400">
                    <span>Brush Size</span>
                    <span id="brushSizeVal">8</span>
                </div>
                <input type="range" id="brushSlider" min="1" max="40" value="8" class="w-full">
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-[10px] font-bold uppercase text-slate-400">
                    <span>Sim Speed</span>
                    <span id="speedVal">1.0x</span>
                </div>
                <input type="range" id="speedSlider" min="0" max="3" step="0.1" value="1" class="w-full">
            </div>
        </div>
        
        <!-- 材質列 -->
        <div id="toolbar" class="flex gap-2 overflow-x-auto pb-2 scroll-hide"></div>
    </div>

    <!-- 主畫布 -->
    <div class="flex-grow relative touch-none" id="canvasContainer">
        <canvas id="sandboxCanvas"></canvas>
    </div>

    <!-- 模式切換 -->
    <div class="glass-panel p-4 flex gap-3 border-t border-slate-200 dark:border-slate-800 shrink-0">
        <button id="modeBuild" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-transform">建造模式</button>
        <button id="modeErase" class="flex-1 py-3 bg-slate-200 dark:bg-slate-800 text-slate-500 rounded-xl font-bold text-sm active:scale-95 transition-transform">橡皮擦</button>
    </div>

    <script>
        /**
         * 1. 核心定義區
         */
        const TICK_SIZE = 4;
        const MAT = {
            EMPTY: 0, SAND: 1, WATER: 2, STONE: 3, 
            WOOD: 4, PLANT: 5, SEED: 6, FIRE: 7, 
            OIL: 8, LAVA: 9, ACID: 10, CLONER: 11
        };

        const MATERIALS_CONFIG = {
            [MAT.EMPTY]: { name: '空氣', color: '#000000', type: 'gas' },
            [MAT.SAND]:  { name: '沙子', color: '#facc15', type: 'powder', density: 1.5 },
            [MAT.WATER]: { name: '流水', color: '#3b82f6', type: 'liquid', density: 1.0, flow: 5 },
            [MAT.STONE]: { name: '石頭', color: '#64748b', type: 'solid', immovable: true },
            [MAT.WOOD]:  { name: '木頭', color: '#78350f', type: 'solid', immovable: true },
            [MAT.PLANT]: { name: '植物', color: '#22c55e', type: 'solid', immovable: true },
            [MAT.SEED]:  { name: '種子', color: '#fbbf24', type: 'powder', density: 0.9 },
            [MAT.FIRE]:  { name: '火焰', color: '#ef4444', type: 'gas', lifetime: 50 },
            [MAT.OIL]:   { name: '石油', color: '#44403c', type: 'liquid', density: 0.8, flow: 4 },
            [MAT.LAVA]:  { name: '岩漿', color: '#f97316', type: 'liquid', density: 2.5, flow: 2 },
            [MAT.ACID]:  { name: '強酸', color: '#a3e635', type: 'liquid', density: 1.2, flow: 3 },
            [MAT.CLONER]:{ name: '克隆', color: '#ec4899', type: 'solid', immovable: true }
        };

        /**
         * 2. 狀態變數
         */
        let canvas, ctx, container;
        let width, height, cols, rows;
        let grid, nextGrid, modified, wetness;
        let selectedMaterial = MAT.SAND, brushSize = 8, simSpeed = 1.0;
        let isEraser = false, isDrawing = false, pointerX = -1, pointerY = -1, lastX = -1, lastY = -1;
        let frameAcc = 0;

        /**
         * 3. 初始化
         */
        function init() {
            canvas = document.getElementById('sandboxCanvas');
            ctx = canvas.getContext('2d', { alpha: false });
            container = document.getElementById('canvasContainer');
            
            setupDimensions();
            createToolbar();
            bindEvents();
            
            requestAnimationFrame(gameLoop);
        }

        function setupDimensions() {
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
            cols = Math.floor(width / TICK_SIZE);
            rows = Math.floor(height / TICK_SIZE);
            
            grid = Array.from({ length: cols }, () => new Uint8Array(rows));
            nextGrid = Array.from({ length: cols }, () => new Uint8Array(rows));
            modified = Array.from({ length: cols }, () => new Uint8Array(rows));
            wetness = Array.from({ length: cols }, () => new Uint8Array(rows));
            
            for(let x=0; x<cols; x++) grid[x][rows-1] = MAT.STONE;
            for(let y=0; y<rows; y++) { grid[0][y] = MAT.STONE; grid[cols-1][y] = MAT.STONE; }
        }

        function createToolbar() {
            const toolbar = document.getElementById('toolbar');
            Object.keys(MATERIALS_CONFIG).forEach(id => {
                const matId = parseInt(id);
                if (matId === MAT.EMPTY) return;
                const btn = document.createElement('button');
                btn.className = `shrink-0 px-4 py-2 rounded-lg border text-xs font-bold transition-all bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-500`;
                btn.innerText = MATERIALS_CONFIG[matId].name;
                btn.onclick = () => { selectedMaterial = matId; isEraser = false; updateUI(); };
                btn.dataset.id = matId;
                toolbar.appendChild(btn);
            });
            updateUI();
        }

        /**
         * 4. 核心模擬循環
         */
        function updatePhysics() {
            if (isDrawing) {
                applyBrush(pointerX, pointerY, lastX, lastY);
                lastX = pointerX;
                lastY = pointerY;
            }

            for (let i = 0; i < cols; i++) {
                nextGrid[i].set(grid[i]);
                modified[i].fill(0);
            }

            for (let y = rows - 2; y >= 1; y--) {
                const shuffleX = Math.random() < 0.5;
                for (let i = 1; i < cols - 1; i++) {
                    const x = shuffleX ? i : cols - 1 - i;
                    const state = grid[x][y];
                    if (state === MAT.EMPTY || modified[x][y]) continue;

                    const config = MATERIALS_CONFIG[state];

                    switch(state) {
                        case MAT.WATER: spreadWetness(x, y); break;
                        case MAT.SEED:  handleSeed(x, y); break;
                        case MAT.PLANT: handlePlant(x, y); break;
                        case MAT.FIRE:  handleFire(x, y); continue;
                        case MAT.LAVA:  handleLava(x, y); break;
                        case MAT.ACID:  handleAcid(x, y); break;
                        case MAT.CLONER: handleCloner(x, y); continue;
                    }

                    if (config.immovable) continue;

                    let moved = false;
                    const below = grid[x][y+1];
                    const belowConfig = MATERIALS_CONFIG[below];

                    if (below === MAT.EMPTY || (belowConfig.type === 'liquid' && config.density > belowConfig.density)) {
                        if (moveParticle(x, y, x, y + 1)) moved = true;
                    }

                    if (!moved && (config.type === 'powder' || config.type === 'liquid')) {
                        let side = Math.random() < 0.5 ? 1 : -1;
                        for (let s of [side, -side]) {
                            const nx = x + s;
                            if (nx > 0 && nx < cols - 1) {
                                const target = grid[nx][y+1];
                                const targetConfig = MATERIALS_CONFIG[target];
                                if (target === MAT.EMPTY || (targetConfig.type === 'liquid' && config.density > targetConfig.density)) {
                                    if (moveParticle(x, y, nx, y + 1)) { moved = true; break; }
                                }
                            }
                        }
                    }

                    if (!moved && config.type === 'liquid') {
                        let side = Math.random() < 0.5 ? 1 : -1;
                        for (let f = 1; f <= config.flow; f++) {
                            for (let s of [side, -side]) {
                                const nx = x + s * f;
                                if (nx > 0 && nx < cols - 1) {
                                    if (grid[nx][y] === MAT.EMPTY && grid[nx][y+1] !== MAT.EMPTY) {
                                        if (moveParticle(x, y, nx, y)) { moved = true; break; }
                                    }
                                }
                            }
                            if (moved) break;
                        }
                    }
                }
            }
            for (let i = 0; i < cols; i++) grid[i].set(nextGrid[i]);
        }

        /**
         * 5. 植物/種子 工程邏輯更新版
         */
        function handleSeed(x, y) {
            let hasWater = wetness[x][y] > 10;
            const ground = grid[x][y+1];
            const onSolid = (ground !== MAT.EMPTY && ground !== MAT.WATER && ground !== MAT.FIRE);

            if (hasWater && onSolid && Math.random() < 0.05) {
                nextGrid[x][y] = MAT.PLANT;
                modified[x][y] = 1;
                wetness[x][y] = 60;
            }
        }

        function handlePlant(x, y) {
            // A. 毛細作用
            const dirs = [[0,1],[1,0],[-1,0],[0,-1]];
            for(let [dx,dy] of dirs) {
                const nx = x+dx, ny = y+dy;
                if(grid[nx][ny] === MAT.PLANT) {
                    const diff = wetness[nx][ny] - wetness[x][y];
                    if(diff > 1) {
                        const flow = Math.ceil(diff * 0.3);
                        wetness[x][y] += flow;
                        wetness[nx][ny] -= flow;
                    }
                }
            }

            // B. 結構支撐
            let supports = 0;
            for(let [dx,dy] of [[0,1],[1,1],[-1,1],[1,0],[-1,0]]) {
                const nx = x+dx, ny = y+dy;
                if(grid[nx][ny] !== MAT.EMPTY && grid[nx][ny] !== MAT.WATER && grid[nx][ny] !== MAT.FIRE) {
                    supports++;
                }
            }
            if (supports === 0 && Math.random() < 0.01) {
                nextGrid[x][y] = MAT.WOOD;
                return;
            }

            // C. 生長優化：穿透種子
            if (Math.random() < 0.08 && wetness[x][y] > 20) {
                const growthChoices = [
                    [0, -1, 45], // 上
                    [-1, -1, 15], [1, -1, 15],
                    [-1, 0, 10], [1, 0, 10], [0, 1, 5]
                ];
                
                let totalWeight = growthChoices.reduce((acc, curr) => acc + curr[2], 0);
                let random = Math.random() * totalWeight;
                let pick = growthChoices[0];
                for (let choice of growthChoices) {
                    if (random < choice[2]) { pick = choice; break; }
                    random -= choice[2];
                }

                const nx = x + pick[0], ny = y + pick[1];

                if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1) {
                    // 檢查目標物
                    const target = grid[nx][ny];
                    let canGrow = false;

                    // 1. 空氣或沙子直接生長
                    if (target === MAT.EMPTY || target === MAT.SAND) {
                        canGrow = true;
                    } 
                    // 2. 核心解決方案：如果遇到種子，嘗試將種子「擠開」到上方
                    else if (target === MAT.SEED) {
                        const aboveTarget = grid[nx][ny-1];
                        if (aboveTarget === MAT.EMPTY) {
                            nextGrid[nx][ny-1] = MAT.SEED; // 向上位移
                            wetness[nx][ny-1] = wetness[nx][ny];
                            canGrow = true;
                        } else {
                            // 若上方不空，直接覆蓋（植物生命力更強）
                            canGrow = true;
                        }
                    }

                    // 防畸形檢查
                    let neighborsCount = 0;
                    for(let ox=-1; ox<=1; ox++) {
                        for(let oy=-1; oy<=1; oy++) {
                            if(grid[nx+ox][ny+oy] === MAT.PLANT) neighborsCount++;
                        }
                    }

                    if (canGrow && neighborsCount < 2) {
                        nextGrid[nx][ny] = MAT.PLANT;
                        modified[nx][ny] = 1;
                        wetness[nx][ny] = 15;
                        wetness[x][y] -= 12;
                    }
                }
            }
            
            if (wetness[x][y] <= 0 && Math.random() < 0.002) {
                nextGrid[x][y] = MAT.WOOD;
            }
        }

        /**
         * 6. 其他元素邏輯
         */
        function handleFire(x, y) {
            const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
            for(let [dx,dy] of neighbors) {
                const nx = x+dx, ny = y+dy;
                const target = grid[nx][ny];
                if(target === MAT.PLANT || target === MAT.WOOD || target === MAT.OIL) {
                    if(Math.random() < 0.1) nextGrid[nx][ny] = MAT.FIRE;
                } else if(target === MAT.WATER) {
                    nextGrid[x][y] = MAT.EMPTY;
                    return;
                }
            }
            if(Math.random() < 0.15) nextGrid[x][y] = MAT.EMPTY;
            else moveParticle(x, y, x + (Math.random() < 0.5 ? 1 : -1), y - 1);
        }

        function handleCloner(x, y) {
            const source = grid[x][y+1];
            if(source !== MAT.EMPTY && source !== MAT.CLONER && source !== MAT.STONE) {
                if(grid[x-1][y] === MAT.EMPTY) nextGrid[x-1][y] = source;
                if(grid[x+1][y] === MAT.EMPTY) nextGrid[x+1][y] = source;
            }
        }

        function handleLava(x, y) {
            const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
            for(let [dx,dy] of neighbors) {
                const nx = x+dx, ny = y+dy;
                if(grid[nx][ny] === MAT.WATER) {
                    nextGrid[nx][ny] = MAT.STONE;
                    nextGrid[x][y] = MAT.STONE;
                }
            }
        }

        function handleAcid(x, y) {
             const neighbors = [[0,1],[0,-1],[1,0],[-1,0]];
             for(let [dx,dy] of neighbors) {
                const nx = x+dx, ny = y+dy;
                const t = grid[nx][ny];
                if(t !== MAT.EMPTY && t !== MAT.ACID && t !== MAT.STONE) {
                    if(Math.random() < 0.1) nextGrid[nx][ny] = MAT.EMPTY;
                }
             }
        }

        function spreadWetness(x, y) {
            const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
            for(let [dx,dy] of dirs) {
                const nx = x+dx, ny = y+dy;
                if(nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                    const t = grid[nx][ny];
                    if(t === MAT.SAND || t === MAT.STONE || t === MAT.PLANT || t === MAT.SEED) {
                        wetness[nx][ny] = Math.min(100, wetness[nx][ny] + 30);
                    }
                }
            }
        }

        /**
         * 7. 輔助函數
         */
        function moveParticle(x1, y1, x2, y2) {
            if (x2 <= 0 || x2 >= cols - 1 || y2 <= 0 || y2 >= rows - 1) return false;
            if (modified[x1][y1] || modified[x2][y2]) return false;
            const v1 = grid[x1][y1], v2 = grid[x2][y2];
            nextGrid[x1][y1] = v2; nextGrid[x2][y2] = v1;
            modified[x1][y1] = 1; modified[x2][y2] = 1;
            const w1 = wetness[x1][y1]; wetness[x1][y1] = wetness[x2][y2]; wetness[x2][y2] = w1;
            return true;
        }

        function applyBrush(currX, currY, prevX, prevY) {
            if (currX === -1 || currY === -1) return;
            const startX = prevX === -1 ? currX : prevX;
            const startY = prevY === -1 ? currY : prevY;

            interpolateLine(startX, startY, currX, currY, (ix, iy) => {
                const radius = Math.floor(brushSize / 2);
                for(let i=-radius; i<=radius; i++) {
                    for(let j=-radius; j<=radius; j++) {
                        if(i*i + j*j <= radius*radius) {
                            const nx = ix+i, ny = iy+j;
                            if(nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1) {
                                const m = isEraser ? MAT.EMPTY : selectedMaterial;
                                grid[nx][ny] = m;
                                nextGrid[nx][ny] = m;
                                wetness[nx][ny] = (m === MAT.WATER) ? 100 : 0;
                            }
                        }
                    }
                }
            });
        }

        function draw() {
            const isDark = document.documentElement.classList.contains('dark');
            ctx.fillStyle = isDark ? '#020617' : '#f8fafc';
            ctx.fillRect(0, 0, width, height);
            let count = 0;
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const s = grid[i][j];
                    if (s === MAT.EMPTY) continue;
                    count++;
                    const config = MATERIALS_CONFIG[s];
                    let color = config.color;
                    if (wetness[i][j] > 0 && [MAT.SAND, MAT.STONE, MAT.PLANT, MAT.SEED].includes(s)) {
                        const intensity = Math.min(0.4, wetness[i][j] / 100);
                        color = lerpColor(color, '#1e3a8a', intensity);
                    }
                    ctx.fillStyle = color;
                    ctx.fillRect(i * TICK_SIZE, j * TICK_SIZE, TICK_SIZE, TICK_SIZE);
                }
            }
            document.getElementById('particleCount').innerText = count;
        }

        function lerpColor(a, b, amount) {
            const ah = parseInt(a.replace(/#/g, ''), 16), ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff,
                bh = parseInt(b.replace(/#/g, ''), 16), br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
            const rr = ar + amount * (br - ar), rg = ag + amount * (bg - ag), rb = ab + amount * (bb - ab);
            return '#' + ((1 << 24) + (Math.round(rr) << 16) + (Math.round(rg) << 8) + Math.round(rb)).toString(16).slice(1);
        }

        /**
         * 8. 互動綁定
         */
        function bindEvents() {
            const updatePointer = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = e.clientX || (e.touches && e.touches[0].clientX);
                const cy = e.clientY || (e.touches && e.touches[0].clientY);
                pointerX = Math.floor((cx - rect.left) / TICK_SIZE);
                pointerY = Math.floor((cy - rect.top) / TICK_SIZE);
            };

            canvas.addEventListener('mousedown', (e) => { 
                isDrawing = true; 
                updatePointer(e);
                lastX = pointerX; lastY = pointerY;
                applyBrush(pointerX, pointerY, -1, -1); 
            });
            window.addEventListener('mousemove', (e) => { if(isDrawing) updatePointer(e); });
            window.addEventListener('mouseup', () => { isDrawing = false; pointerX = -1; pointerY = -1; lastX = -1; lastY = -1; });
            
            canvas.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                isDrawing = true; 
                updatePointer(e);
                lastX = pointerX; lastY = pointerY;
                applyBrush(pointerX, pointerY, -1, -1);
            }, {passive:false});
            window.addEventListener('touchmove', (e) => { if(isDrawing) updatePointer(e); }, {passive:false});
            window.addEventListener('touchend', () => { isDrawing = false; pointerX = -1; pointerY = -1; lastX = -1; lastY = -1; });

            document.getElementById('brushSlider').oninput = (e) => {
                brushSize = parseInt(e.target.value);
                document.getElementById('brushSizeVal').innerText = brushSize;
            };
            document.getElementById('speedSlider').oninput = (e) => {
                simSpeed = parseFloat(e.target.value);
                document.getElementById('speedVal').innerText = simSpeed.toFixed(1) + 'x';
            };
            document.getElementById('modeBuild').onclick = () => { isEraser = false; updateUI(); };
            document.getElementById('modeErase').onclick = () => { isEraser = true; updateUI(); };
            document.getElementById('themeToggle').onclick = () => { document.documentElement.classList.toggle('dark'); };
            document.getElementById('clearBtn').onclick = () => setupDimensions();
        }

        function interpolateLine(x0, y0, x1, y1, callback) {
            let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1, sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;
            while (true) {
                callback(x0, y0);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
        }

        function updateUI() {
            document.querySelectorAll('#toolbar button').forEach(btn => {
                btn.classList.toggle('active-tool', parseInt(btn.dataset.id) === selectedMaterial && !isEraser);
            });
            document.getElementById('modeBuild').className = `flex-1 py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-transform ${!isEraser ? 'bg-blue-600 text-white' : 'bg-slate-200 dark:bg-slate-800 text-slate-500'}`;
            document.getElementById('modeErase').className = `flex-1 py-3 rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-transform ${isEraser ? 'bg-red-600 text-white' : 'bg-slate-200 dark:bg-slate-800 text-slate-500'}`;
        }

        let lastFrame = 0;
        function gameLoop(time) {
            const dt = time - lastFrame;
            lastFrame = time;
            document.getElementById('fpsCounter').innerText = Math.round(1000/dt);
            if (simSpeed > 0) {
                frameAcc += simSpeed;
                while(frameAcc >= 1) { updatePhysics(); frameAcc--; }
            }
            draw();
            requestAnimationFrame(gameLoop);
        }
        window.onload = init;
    </script>
