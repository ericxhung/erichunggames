<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>象棋大師：雙模式強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap');
        body { background-color: #f3e5ab; font-family: 'Noto Serif TC', serif; touch-action: manipulation; overflow: hidden; }
        .wood-panel { background: linear-gradient(135deg, #d4a373 0%, #a98467 100%); }
        canvas { max-width: 95vw; max-height: 70vh; box-shadow: 0 10px 30px rgba(0,0,0,0.4); border: 8px solid #5d4037; border-radius: 4px; background-color: #f3e5ab; }
        .piece-btn { transition: transform 0.1s; }
        .piece-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
	<iframe 
	    src="nav.html" 
	    style="width: 100%; height: 64px; border: none; display: block; position: sticky; top: 0; z-index: 9999;" 
	    scrolling="no" 
	    title="導覽列">
	</iframe>
    <!-- 模式選擇 (主選單) -->
    <div id="home-screen" class="fixed inset-0 z-50 wood-panel flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
        <h1 class="text-5xl font-bold text-amber-950 mb-2 drop-shadow-md">象棋大師</h1>
        <p class="text-amber-900 mb-8 font-bold">本地演算法 & 多模式支援</p>
        
        <div class="grid grid-cols-1 gap-4 w-full max-w-xs">
            <!-- 明棋區 -->
            <div class="text-amber-950 font-bold mb-1 text-left border-b border-amber-900/20 pb-1">經典明棋</div>
            <button onclick="startGame('classic', 'pve')" class="bg-red-800 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-900 piece-btn">挑戰電腦 (PVE)</button>
            <button onclick="startGame('classic', 'pvp')" class="bg-red-700/80 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-red-800 piece-btn">雙人對弈 (PVP)</button>
            
            <!-- 暗棋區 -->
            <div class="text-emerald-950 font-bold mt-4 mb-1 text-left border-b border-emerald-900/20 pb-1">趣味暗棋</div>
            <button onclick="startGame('dark', 'pve')" class="bg-emerald-800 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-900 piece-btn">挑戰電腦 (PVE)</button>
            <button onclick="startGame('dark', 'pvp')" class="bg-emerald-700/80 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-800 piece-btn">雙人對弈 (PVP)</button>
        </div>
        <p class="mt-8 text-amber-950/60 text-xs font-sans">無需網路 · 離線演算 · 觸控優化</p>
    </div>

    <!-- 遊戲介面 -->
    <div id="game-screen" class="hidden w-full max-w-md text-center space-y-4">
        <div class="flex items-center justify-between px-4">
            <!-- 修改後的返回選單按鈕 -->
            <button onclick="backToMenu()" class="bg-amber-900/10 text-amber-950 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm border border-amber-900/20 hover:bg-white/40 transition">返回選單</button>
            <div id="status" class="text-xl font-bold text-red-800 bg-white/50 px-6 py-1 rounded-full shadow-inner">紅方走子</div>
            <div id="ai-loading" class="invisible flex items-center gap-1">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-bounce"></span>
                <span class="text-xs font-bold text-red-900">AI 計算</span>
            </div>
        </div>

        <div class="relative inline-block">
            <canvas id="chessBoard"></canvas>
            
            <!-- 勝利彈窗 -->
            <div id="winner-overlay" class="hidden absolute inset-0 bg-black/70 flex items-center justify-center rounded transition-opacity duration-500">
                <div class="bg-amber-50 p-10 rounded-3xl shadow-2xl border-4 border-amber-900 text-center scale-110">
                    <h2 id="winner-text" class="text-4xl font-bold mb-6 text-amber-900">紅方勝！</h2>
                    <button onclick="backToMenu()" class="bg-red-800 text-white px-10 py-3 rounded-xl font-bold text-xl shadow-lg active:scale-95 transition">返回選單</button>
                </div>
            </div>
        </div>
        <p id="mode-indicator" class="text-amber-900/60 text-sm italic">明棋模式</p>
    </div>

    <script>
        const canvas = document.getElementById('chessBoard');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const aiLoading = document.getElementById('ai-loading');
        
        let GRID_SIZE = 44, OFFSET_X = 22, OFFSET_Y = 22, PIECE_RADIUS = 19;
        let gameMode = 'classic', playType = 'pve', turn = 'R', board = [], selected = null, gameOver = false;
        let maxRows = 10, maxCols = 9;
        let p1Color = null; 

        const VALUES = { 'K': 10000, 'R': 1000, 'N': 450, 'C': 500, 'A': 200, 'B': 200, 'P': 100 };
        const DARK_RANKS = { 'K': 7, 'R': 6, 'N': 5, 'C': 4, 'A': 3, 'B': 2, 'P': 1 };
        const PIECE_NAMES = {
            'R': { 'R': '俥', 'B': '車' }, 'N': { 'R': '傌', 'B': '馬' },
            'B': { 'R': '相', 'B': '象' }, 'A': { 'R': '仕', 'B': '士' },
            'K': { 'R': '帥', 'B': '將' }, 'C': { 'R': '炮', 'B': '砲' },
            'P': { 'R': '兵', 'B': '卒' }
        };
        const PIECE_DATA_COUNT = { 'K': 1, 'R': 2, 'N': 2, 'B': 2, 'A': 2, 'C': 2, 'P': 5 };

        // 返回選單邏輯，不再刷新頁面
        function backToMenu() {
            gameOver = false;
            selected = null;
            board = [];
            document.getElementById('winner-overlay').classList.add('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        function startGame(mode, type) {
            gameMode = mode;
            playType = type;
            maxRows = mode === 'classic' ? 10 : 4;
            maxCols = mode === 'classic' ? 9 : 8;
            GRID_SIZE = mode === 'classic' ? 44 : 48;
            p1Color = null;
            turn = mode === 'classic' ? 'R' : 'P1';
            gameOver = false;
            selected = null;
            
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('mode-indicator').innerText = (mode === 'classic' ? '經典明棋' : '趣味暗棋') + (type === 'pve' ? ' (VS 電腦)' : ' (雙人)');
            
            updateStatusText();
            initBoard();
            render();
        }

        function initBoard() {
            board = Array(maxRows).fill(null).map(() => Array(maxCols).fill(null));
            if (gameMode === 'classic') {
                const setup = ['R','N','B','A','K','A','B','N','R'];
                setup.forEach((t, c) => {
                    board[0][c] = { type: t, color: 'B', revealed: true };
                    board[9][c] = { type: t, color: 'R', revealed: true };
                });
                board[2][1] = { type: 'C', color: 'B', revealed: true }; board[2][7] = { type: 'C', color: 'B', revealed: true };
                board[7][1] = { type: 'C', color: 'R', revealed: true }; board[7][7] = { type: 'C', color: 'R', revealed: true };
                [0,2,4,6,8].forEach(c => {
                    board[3][c] = { type: 'P', color: 'B', revealed: true };
                    board[6][c] = { type: 'P', color: 'R', revealed: true };
                });
            } else {
                let pieces = [];
                ['R','B'].forEach(color => {
                    Object.keys(PIECE_DATA_COUNT).forEach(type => {
                        for(let i=0; i<PIECE_DATA_COUNT[type]; i++) pieces.push({ type, color, revealed: false });
                    });
                });
                pieces.sort(() => Math.random() - 0.5);
                let idx = 0;
                for(let r=0; r<4; r++) for(let c=0; c<8; c++) board[r][c] = pieces[idx++];
            }
        }

        function updateStatusText() {
            if (gameMode === 'classic') {
                statusEl.innerText = turn === 'R' ? "紅方走子" : "黑方走子";
                statusEl.style.color = turn === 'R' ? '#b71c1c' : '#212121';
            } else {
                if (!p1Color) {
                    statusEl.innerText = turn === 'P1' ? "玩家 1 翻棋" : "玩家 2 翻棋";
                    statusEl.style.color = '#5d4037';
                } else {
                    const curColor = (turn === 'P1' ? p1Color : (p1Color === 'R' ? 'B' : 'R'));
                    statusEl.innerText = (turn === 'P1' ? "玩家 1" : "玩家 2") + (curColor === 'R' ? " (紅)" : " (黑)");
                    statusEl.style.color = curColor === 'R' ? '#b71c1c' : '#212121';
                }
            }
        }

        function render() {
            canvas.width = (maxCols - 1) * GRID_SIZE + OFFSET_X * 2;
            canvas.height = (maxRows - 1) * GRID_SIZE + OFFSET_Y * 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#5d4037'; ctx.lineWidth = 1.5;
            for(let i=0; i<maxRows; i++) {
                ctx.beginPath(); ctx.moveTo(OFFSET_X, OFFSET_Y + i*GRID_SIZE);
                ctx.lineTo(canvas.width - OFFSET_X, OFFSET_Y + i*GRID_SIZE); ctx.stroke();
            }
            for(let i=0; i<maxCols; i++) {
                ctx.beginPath();
                if (gameMode === 'classic') {
                    if (i === 0 || i === 8) {
                        ctx.moveTo(OFFSET_X + i*GRID_SIZE, OFFSET_Y);
                        ctx.lineTo(OFFSET_X + i*GRID_SIZE, canvas.height - OFFSET_Y);
                    } else {
                        ctx.moveTo(OFFSET_X + i*GRID_SIZE, OFFSET_Y);
                        ctx.lineTo(OFFSET_X + i*GRID_SIZE, OFFSET_Y + 4*GRID_SIZE);
                        ctx.moveTo(OFFSET_X + i*GRID_SIZE, OFFSET_Y + 5*GRID_SIZE);
                        ctx.lineTo(OFFSET_X + i*GRID_SIZE, OFFSET_Y + 9*GRID_SIZE);
                    }
                } else {
                    ctx.moveTo(OFFSET_X + i*GRID_SIZE, OFFSET_Y);
                    ctx.lineTo(OFFSET_X + i*GRID_SIZE, canvas.height - OFFSET_Y);
                }
                ctx.stroke();
            }

            if(gameMode === 'classic') {
                ctx.beginPath();
                ctx.moveTo(OFFSET_X + 3*GRID_SIZE, OFFSET_Y); ctx.lineTo(OFFSET_X + 5*GRID_SIZE, OFFSET_Y + 2*GRID_SIZE);
                ctx.moveTo(OFFSET_X + 5*GRID_SIZE, OFFSET_Y); ctx.lineTo(OFFSET_X + 3*GRID_SIZE, OFFSET_Y + 2*GRID_SIZE);
                ctx.moveTo(OFFSET_X + 3*GRID_SIZE, OFFSET_Y + 7*GRID_SIZE); ctx.lineTo(OFFSET_X + 5*GRID_SIZE, OFFSET_Y + 9*GRID_SIZE);
                ctx.moveTo(OFFSET_X + 5*GRID_SIZE, OFFSET_Y + 7*GRID_SIZE); ctx.lineTo(OFFSET_X + 3*GRID_SIZE, OFFSET_Y + 9*GRID_SIZE);
                ctx.stroke();
            }

            board.forEach((row, r) => row.forEach((p, c) => { if(p) drawPiece(r, c, p); }));
            
            if(selected) {
                ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4;
                ctx.strokeRect(OFFSET_X + selected.c*GRID_SIZE - (PIECE_RADIUS+2), OFFSET_Y + selected.r*GRID_SIZE - (PIECE_RADIUS+2), (PIECE_RADIUS+2)*2, (PIECE_RADIUS+2)*2);
            }
        }

        function drawPiece(r, c, p) {
            const x = OFFSET_X + c*GRID_SIZE, y = OFFSET_Y + r*GRID_SIZE;
            ctx.beginPath(); ctx.arc(x, y, PIECE_RADIUS, 0, Math.PI*2);
            ctx.fillStyle = p.revealed ? '#fbe9e7' : '#a1887f'; ctx.fill();
            ctx.strokeStyle = p.revealed ? (p.color === 'R' ? '#b71c1c' : '#212121') : '#5d4037';
            ctx.lineWidth = 2; ctx.stroke();
            
            if (p.revealed) {
                ctx.font = 'bold 24px "Noto Serif TC"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = p.color === 'R' ? '#b71c1c' : '#212121';
                ctx.fillText(PIECE_NAMES[p.type][p.color], x, y + 2);
            } else {
                ctx.fillStyle = '#5d4037'; ctx.font = '14px sans-serif';
                ctx.fillText('?', x, y + 2);
            }
        }

        function canMove(sr, sc, tr, tc, color, tempBoard = board) {
            const p = tempBoard[sr][sc];
            if (!p || !p.revealed) return false;
            const target = tempBoard[tr][tc];
            if (target && target.revealed && target.color === color) return false;
            
            const dr = tr - sr, dc = tc - sc;

            if (gameMode === 'classic') {
                switch(p.type) {
                    case 'K': return Math.abs(dr)+Math.abs(dc)===1 && tc>=3 && tc<=5 && (color==='R'?tr>=7:tr<=2);
                    case 'A': return Math.abs(dr)===1 && Math.abs(dc)===1 && tc>=3 && tc<=5 && (color==='R'?tr>=7:tr<=2);
                    case 'B': 
                        if (Math.abs(dr)!==2 || Math.abs(dc)!==2) return false;
                        if (tempBoard[sr+dr/2][sc+dc/2]) return false;
                        return color==='R' ? tr>=5 : tr<=4;
                    case 'N':
                        if (!((Math.abs(dr)===2 && Math.abs(dc)===1) || (Math.abs(dr)===1 && Math.abs(dc)===2))) return false;
                        if (Math.abs(dr)===2 && tempBoard[sr+dr/2][sc]) return false;
                        if (Math.abs(dc)===2 && tempBoard[sr][sc+dc/2]) return false;
                        return true;
                    case 'R':
                        if (dr!==0 && dc!==0) return false;
                        let count = 0;
                        if (dr===0) for(let i=Math.min(sc,tc)+1; i<Math.max(sc,tc); i++) if(tempBoard[sr][i]) count++;
                        else for(let i=Math.min(sr,tr)+1; i<Math.max(sr,tr); i++) if(tempBoard[i][sc]) count++;
                        return count === 0;
                    case 'C':
                        if (dr!==0 && dc!==0) return false;
                        let cnt = 0;
                        if (dr===0) for(let i=Math.min(sc,tc)+1; i<Math.max(sc,tc); i++) if(tempBoard[sr][i]) cnt++;
                        else for(let i=Math.min(sr,tr)+1; i<Math.max(sr,tr); i++) if(tempBoard[i][sc]) cnt++;
                        return target ? cnt === 1 : cnt === 0;
                    case 'P':
                        if (color==='R') {
                            if (tr > sr) return false;
                            if (sr >= 5) return dr===-1 && dc===0;
                            return Math.abs(dr)+Math.abs(dc)===1 && dr<=0;
                        } else {
                            if (tr < sr) return false;
                            if (sr <= 4) return dr===1 && dc===0;
                            return Math.abs(dr)+Math.abs(dc)===1 && dr>=0;
                        }
                }
            } else {
                if (Math.abs(dr) + Math.abs(dc) !== 1) return false;
                if (!target) return true;
                if (!target.revealed) return false;
                const sRank = DARK_RANKS[p.type];
                const tRank = DARK_RANKS[target.type];
                if (p.type === 'P' && target.type === 'K') return true;
                if (p.type === 'K' && target.type === 'P') return false;
                return sRank >= tRank;
            }
            return false;
        }

        function aiAction() {
            if (gameOver) return;
            aiLoading.classList.remove('invisible');
            setTimeout(() => {
                if (gameOver) return;
                let moves = [];
                const aiColor = (gameMode === 'classic' ? 'B' : (p1Color === 'R' ? 'B' : 'R'));
                
                for(let r=0; r<maxRows; r++) {
                    for(let c=0; c<maxCols; c++) {
                        const p = board[r][c];
                        if (p && p.color === aiColor) {
                            if (p.revealed) {
                                for(let tr=0; tr<maxRows; tr++) {
                                    for(let tc=0; tc<maxCols; tc++) {
                                        if (canMove(r, c, tr, tc, aiColor)) moves.push({action:'move', sr:r, sc:c, tr, tc, score:0});
                                    }
                                }
                            } else if (gameMode === 'dark') {
                                moves.push({action:'reveal', r, c, score: 50});
                            }
                        }
                    }
                }

                if (moves.length === 0) { endGame(aiColor === 'B' ? '紅方勝！' : '黑方勝！'); aiLoading.classList.add('invisible'); return; }

                moves.forEach(m => {
                    if(m.action === 'move') {
                        const target = board[m.tr][m.tc];
                        if (target) m.score = VALUES[target.type] || 50;
                    }
                });
                moves.sort((a, b) => b.score - a.score);

                const best = moves[0];
                if (best.action === 'reveal') {
                    const p = board[best.r][best.c];
                    p.revealed = true;
                    if (gameMode === 'dark' && !p1Color) p1Color = p.color === 'R' ? 'B' : 'R';
                } else {
                    if (board[best.tr][best.tc]?.type === 'K') endGame('電腦勝！');
                    board[best.tr][best.tc] = board[best.sr][best.sc];
                    board[best.sr][best.sc] = null;
                }

                turn = (gameMode === 'classic' ? 'R' : 'P1');
                updateStatusText();
                aiLoading.classList.add('invisible');
                render();
            }, 500);
        }

        function endGame(text) {
            gameOver = true;
            document.getElementById('winner-overlay').classList.remove('hidden');
            document.getElementById('winner-text').innerText = text;
        }

        canvas.addEventListener('mousedown', (e) => {
            if (gameOver || (playType==='pve' && (gameMode==='classic'?turn==='B':turn==='P2'))) return;
            const rect = canvas.getBoundingClientRect();
            const c = Math.round(((e.clientX - rect.left) * (canvas.width/rect.width) - OFFSET_X) / GRID_SIZE);
            const r = Math.round(((e.clientY - rect.top) * (canvas.height/rect.height) - OFFSET_Y) / GRID_SIZE);
            if (r<0 || r>=maxRows || c<0 || c>=maxCols) return;

            const p = board[r][c];
            
            if (gameMode === 'dark' && p && !p.revealed) {
                p.revealed = true;
                selected = null;
                if (!p1Color) {
                    p1Color = (turn === 'P1' ? p.color : (p.color === 'R' ? 'B' : 'R'));
                }
                turn = turn === 'P1' ? 'P2' : 'P1';
                updateStatusText();
                render();
                if (playType === 'pve' && turn === 'P2') aiAction();
                return;
            }

            const currentPlayerColor = (gameMode === 'classic' ? turn : (turn === 'P1' ? p1Color : (p1Color === 'R' ? 'B' : 'R')));

            if (selected) {
                if (canMove(selected.r, selected.c, r, c, currentPlayerColor)) {
                    if (board[r][c]?.type === 'K') endGame(currentPlayerColor === 'R' ? '紅方勝！' : '黑方勝！');
                    board[r][c] = board[selected.r][selected.c];
                    board[selected.r][selected.c] = null;
                    selected = null;
                    turn = (gameMode === 'classic' ? (turn === 'R' ? 'B' : 'R') : (turn === 'P1' ? 'P2' : 'P1'));
                    updateStatusText();
                    render();
                    if (playType === 'pve' && !gameOver && (gameMode === 'classic' ? turn === 'B' : turn === 'P2')) aiAction();
                } else {
                    selected = (p && p.color === currentPlayerColor && p.revealed) ? {r, c} : null;
                    render();
                }
            } else if (p && p.color === currentPlayerColor && p.revealed) {
                selected = {r, c};
                render();
            }
        });
    </script>
</body>
</html>
