<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const touchRing = document.getElementById('touch-indicator');
const backdrop = document.getElementById('menu-backdrop');

let isTouchMode = false;
function detectDevice() {
    isTouchMode = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    updateUIForMode();
}

function updateUIForMode() {
    const icon = document.getElementById('device-icon');
    const text = document.getElementById('device-text');
    const label = document.getElementById('mode-label');
    if (isTouchMode) {
        icon.innerText = "📱";
        text.innerText = "行動模式：長按 0.6s 顯示選單";
        label.innerText = "手機";
        document.body.classList.add('mobile-mode-active');
    } else {
        icon.innerText = "💻";
        text.innerText = "桌面模式：滑鼠右鍵點擊選單";
        label.innerText = "電腦";
        document.body.classList.remove('mobile-mode-active');
    }
}

function toggleDeviceMode() {
    isTouchMode = !isTouchMode;
    updateUIForMode();
}

// --- 物理引擎 ---
const G = 0.5; 
let bodies = [];
let isPaused = false;
let timeScale = 0.2; 
let zoom = 1.0;
let offsetX = 0, offsetY = 0;
let animationId = null;

class Body {
    constructor(x, y, vx, vy, mass, radius, color, name) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.mass = mass; this.radius = radius; this.color = color; this.name = name;
        this.trail = [];
        this.isDragged = false;
    }
    draw() {
        const sx = (this.x * zoom) + offsetX;
        const sy = (this.y * zoom) + offsetY;
        const sr = Math.max(1, this.radius * zoom);

        if (this.trail.length > 2) {
            ctx.beginPath();
            ctx.strokeStyle = this.color + '22'; 
            ctx.lineWidth = 1;
            ctx.moveTo((this.trail[0].x * zoom) + offsetX, (this.trail[0].y * zoom) + offsetY);
            for(let i=1; i<this.trail.length; i++) {
                ctx.lineTo((this.trail[i].x * zoom) + offsetX, (this.trail[i].y * zoom) + offsetY);
            }
            ctx.stroke();
        }

        if (sx + sr < 0 || sx - sr > canvas.width || sy + sr < 0 || sy - sr > canvas.height) return;

        ctx.beginPath();
        ctx.arc(sx, sy, sr, 0, Math.PI * 2);
        ctx.fillStyle = this.isDragged ? '#ffffff' : this.color;
        if (this.mass > 500) {
            ctx.shadowBlur = (this.isDragged ? 25 : 10) * zoom;
            ctx.shadowColor = this.color;
        }
        ctx.fill();
        ctx.shadowBlur = 0;

        if (zoom > 0.6) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.font = `${Math.max(12, 12 * zoom)}px "Google Sans"`;
            ctx.textAlign = 'center';
            ctx.fillText(this.name || "Planet", sx, sy + sr + 15 * zoom);
        }
    }
    updatePhysics(others, dt) {
        if (isPaused || this.isDragged) return;
        others.forEach(other => {
            if (other === this || other.isDragged) return;
            const dx = other.x - this.x;
            const dy = other.y - this.y;
            const distSq = dx * dx + dy * dy + 1; 
            const dist = Math.sqrt(distSq);
            if (dist < (this.radius + other.radius) * 0.7) {
                this.merge(other);
                return;
            }
            const f = (G * other.mass) / distSq;
            this.vx += (f * dx / dist) * dt;
            this.vy += (f * dy / dist) * dt;
        });
    }
    move(dt) {
        if (!isPaused && !this.isDragged) {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
        }
    }
    merge(other) {
        if (!bodies.includes(other) || !bodies.includes(this)) return;
        const bigger = this.mass >= other.mass ? this : other;
        const smaller = this.mass >= other.mass ? other : this;
        const totalMass = bigger.mass + smaller.mass;
        bigger.vx = (bigger.vx * bigger.mass + smaller.vx * smaller.mass) / totalMass;
        bigger.vy = (bigger.vy * bigger.mass + smaller.vy * smaller.mass) / totalMass;
        bigger.radius = Math.pow(Math.pow(bigger.radius, 3) + Math.pow(smaller.radius, 3), 1/3);
        bigger.mass = totalMass;
        bodies.splice(bodies.indexOf(smaller), 1);
    }
}

function initSolarSystem() {
    bodies = [];
    const EM = 100; const AU = 300;
    const sun = new Body(0, 0, 0, 0, EM * 3330, 45, '#fdb813', '太陽');
    bodies.push(sun);
    const planetData = [[0.38, 0.05, 0.4, '#97979f', '水星'], [0.72, 0.81, 0.9, '#e3bb76', '金星'], [1.0, 1.0, 1.0, '#2277ff', '地球'], [1.52, 0.1, 0.5, '#ff5533', '火星']];
    planetData.forEach(([dAU, mE, rE, col, name]) => {
        const d = dAU * AU; const v = Math.sqrt((G * sun.mass) / d);
        bodies.push(new Body(d, 0, 0, v, mE * EM, rE * 8, col, name));
    });
}

function initNStarSystem(n, starMassInput) {
    bodies = [];
    const mass = starMassInput || 3000;
    const starRadius = Math.max(10, Math.pow(mass / 100, 1/3) * 10);
    const minSafeChord = starRadius * 8; 
    const calculatedR = minSafeChord / (2 * Math.sin(Math.PI / n));
    const R = Math.max(250, calculatedR);
    let netForceFactor = 0;
    for (let i = 1; i < n; i++) {
        const angle = (i * 2 * Math.PI) / n;
        const dist = 2 * R * Math.sin(angle / 2);
        netForceFactor += (Math.sin(angle / 2)) / (dist * dist);
    }
    const v = Math.sqrt(G * mass * netForceFactor * R);
    for (let i = 0; i < n; i++) {
        const angle = (i * 2 * Math.PI) / n;
        const x = R * Math.cos(angle);
        const y = R * Math.sin(angle);
        const vx = -v * Math.sin(angle);
        const vy = v * Math.cos(angle);
        bodies.push(new Body(x, y, vx, vy, mass, starRadius, `hsl(${(i * 360) / n}, 80%, 70%)`, `星體 ${i+1}`));
    }
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!isPaused) {
        const subSteps = 8; const dt = timeScale / subSteps;
        for (let s = 0; s < subSteps; s++) {
            bodies.forEach(b => b.updatePhysics(bodies, dt));
            bodies.forEach(b => b.move(dt));
        }
        bodies.forEach(b => {
            if (!b.isDragged) {
                b.trail.push({x: b.x, y: b.y});
                if (b.trail.length > 60) b.trail.shift();
            }
        });
    }
    bodies.forEach(b => b.draw());
    document.getElementById('count-val').innerText = bodies.length;
    const totalM = bodies.reduce((sum, b) => sum + b.mass, 0);
    document.getElementById('mass-val').innerText = Math.round(totalM).toLocaleString();
    animationId = requestAnimationFrame(loop);
}

// --- 深度交互優化 ---
let isDragging = false, dragTarget = null;
let lastPinchDist = null;
let longPressTimer = null;
let lastInteractionPos = { x: 0, y: 0 };
let currentContextTarget = null;
let startTouchPos = { x: 0, y: 0 };
let moveHistory = []; 

function handlePress(x, y, isTouch = false) {
    const wx = (x - offsetX) / zoom;
    const wy = (y - offsetY) / zoom;
    const target = bodies.find(b => Math.sqrt((b.x-wx)**2 + (b.y-wy)**2) < b.radius + 35/zoom);
    
    hideContextMenu();
    lastInteractionPos = { x, y };
    startTouchPos = { x, y };
    isDragging = true;
    moveHistory = [{ x: wx, y: wy, t: Date.now() }];

    if (target) {
        dragTarget = target;
        dragTarget.isDragged = true;
        dragTarget.trail = []; 
    } else {
        dragTarget = { type: 'camera', lastX: x, lastY: y };
    }

    clearTimeout(longPressTimer);
    if (isTouchMode || isTouch) {
        touchRing.style.left = (x - 40) + 'px';
        touchRing.style.top = (y - 40) + 'px';
        touchRing.style.display = 'block';

        longPressTimer = setTimeout(() => {
            const moveDist = Math.hypot(x - startTouchPos.x, y - startTouchPos.y);
            if (moveDist < 8) {
                isDragging = false;
                if (dragTarget && dragTarget.isDragged) dragTarget.isDragged = false;
                touchRing.style.display = 'none';
                showContextMenu(x, y, target);
                if (navigator.vibrate) navigator.vibrate(60);
            }
        }, 650); 
    }
}

function handleMove(x, y) {
    if (!isDragging || !dragTarget) return;
    const moveDist = Math.hypot(x - startTouchPos.x, y - startTouchPos.y);
    if (moveDist > 10) {
        clearTimeout(longPressTimer);
        touchRing.style.display = 'none';
    }
    const wx = (x - offsetX) / zoom;
    const wy = (y - offsetY) / zoom;
    moveHistory.push({ x: wx, y: wy, t: Date.now() });
    if (moveHistory.length > 5) moveHistory.shift();
    if (dragTarget.type === 'camera') {
        offsetX += (x - dragTarget.lastX);
        offsetY += (y - dragTarget.lastY);
        dragTarget.lastX = x;
        dragTarget.lastY = y;
    } else {
        dragTarget.x = wx;
        dragTarget.y = wy;
    }
}

function handleEnd() {
    if (dragTarget && dragTarget.type !== 'camera') {
        if (moveHistory.length >= 2) {
            const first = moveHistory[0];
            const last = moveHistory[moveHistory.length - 1];
            const dt = (last.t - first.t) || 16;
            dragTarget.vx = ((last.x - first.x) / dt) * 15;
            dragTarget.vy = ((last.y - first.y) / dt) * 15;
        }
        dragTarget.isDragged = false;
    }
    isDragging = false;
    dragTarget = null;
    moveHistory = [];
    clearTimeout(longPressTimer);
    touchRing.style.display = 'none';
}

canvas.addEventListener('mousedown', e => {
    if (e.button === 2) { 
        const wx = (e.clientX - offsetX) / zoom;
        const wy = (e.clientY - offsetY) / zoom;
        const target = bodies.find(b => Math.sqrt((b.x-wx)**2 + (b.y-wy)**2) < b.radius + 35/zoom);
        lastInteractionPos = { x: e.clientX, y: e.clientY };
        showContextMenu(e.clientX, e.clientY, target);
        e.preventDefault();
    } else {
        handlePress(e.clientX, e.clientY, false);
    }
});
canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
        handlePress(e.touches[0].clientX, e.touches[0].clientY, true);
    } else if (e.touches.length === 2) {
        handleEnd();
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
        handleMove(e.touches[0].clientX, e.touches[0].clientY);
    } else if (e.touches.length === 2) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const scale = dist / lastPinchDist;
        const wx = (midX - offsetX) / zoom;
        const wy = (midY - offsetY) / zoom;
        zoom = Math.min(Math.max(zoom * scale, 0.01), 30);
        offsetX = midX - wx * zoom;
        offsetY = midY - wy * zoom;
        lastPinchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', handleEnd);

// --- UI 輔助函數 ---
function updateAddRadius() {
    const mass = parseFloat(document.getElementById('add-mass').value) || 0;
    const radiusInput = document.getElementById('add-radius');
    // 自動計算建議半徑
    const suggestedRadius = Math.max(5, Math.pow(mass / 100, 1/3) * 10);
    radiusInput.value = Math.round(suggestedRadius);
}

function showContextMenu(x, y, target) {
    const menu = document.getElementById('context-menu');
    menu.style.display = 'block';
    backdrop.style.display = 'block';
    
    if (isTouchMode) {
        document.body.classList.add('mobile-context-active');
    } else {
        document.body.classList.remove('mobile-context-active');
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        menu.style.transform = 'none';
    }
    
    currentContextTarget = target;
    if (target) {
        document.getElementById('edit-mode-section').classList.remove('hidden');
        document.getElementById('add-mode-section').classList.add('hidden');
        document.getElementById('edit-name').value = target.name;
        document.getElementById('edit-mass').value = Math.round(target.mass);
    } else {
        document.getElementById('edit-mode-section').classList.add('hidden');
        document.getElementById('add-mode-section').classList.remove('hidden');
    }
}

function hideContextMenu() { 
    document.getElementById('context-menu').style.display = 'none'; 
    backdrop.style.display = 'none';
}

document.getElementById('btn-save-edit').onclick = () => {
    if (currentContextTarget) {
        currentContextTarget.name = document.getElementById('edit-name').value;
        const m = parseFloat(document.getElementById('edit-mass').value);
        currentContextTarget.mass = m;
        currentContextTarget.radius = Math.max(5, Math.pow(m / 100, 1/3) * 10);
    }
    hideContextMenu();
};

document.getElementById('btn-confirm-add').onclick = () => {
    const wx = (lastInteractionPos.x - offsetX) / zoom;
    const wy = (lastInteractionPos.y - offsetY) / zoom;
    
    const name = document.getElementById('add-name').value || "新天體";
    const mass = parseFloat(document.getElementById('add-mass').value) || 200;
    const radius = parseFloat(document.getElementById('add-radius').value) || 12;
    
    bodies.push(new Body(wx, wy, 0, 0, mass, radius, '#8ab4f8', name));
    hideContextMenu();
};

document.getElementById('btn-delete').onclick = () => {
    if (currentContextTarget) bodies.splice(bodies.indexOf(currentContextTarget), 1);
    hideContextMenu();
};

function startGame(type) {
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    document.getElementById('show-panel-btn').classList.remove('hidden');
    if (type === 'solar') initSolarSystem();
    else if (type === 'empty') bodies = [];
    offsetX = canvas.width / 2; offsetY = canvas.height / 2;
    if (!animationId) loop();
}

function promptNStars() { hideResetModal(); isPaused = true; document.getElementById('n-star-modal').classList.add('active'); }
function hideNStarModal() { document.getElementById('n-star-modal').classList.remove('active'); isPaused = false; }
function confirmNStars() {
    initNStarSystem(parseInt(document.getElementById('n-count').value), parseFloat(document.getElementById('n-mass').value));
    startGame('nstar'); hideNStarModal();
}

function togglePanel(v) { document.getElementById('game-ui').classList.toggle('hidden', !v); document.getElementById('show-panel-btn').classList.toggle('hidden', v); }
function pauseGame() { isPaused = !isPaused; document.getElementById('pause-btn').innerText = isPaused ? '繼續' : '暫停'; }
function resetZoom() { zoom = 1; offsetX = canvas.width/2; offsetY = canvas.height/2; }
function showResetModal() { isPaused = true; document.getElementById('reset-modal').classList.add('active'); }
function hideResetModal() { document.getElementById('reset-modal').classList.remove('active'); isPaused = false; }
function confirmReset(type) { startGame(type); hideResetModal(); resetZoom(); }

document.getElementById('time-scale').oninput = e => { 
    timeScale = parseFloat(e.target.value); 
    document.getElementById('time-val').innerText = timeScale.toFixed(1) + 'x'; 
};

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
detectDevice();
</script>
</body>
</html>
